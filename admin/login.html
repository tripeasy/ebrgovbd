<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Education Board Result System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #006a4e, #00843d); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        .login-container { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
        }
        .login-header { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        .login-header h2 { 
            color: #006a4e; 
            font-weight: bold; 
            font-size: 24px; 
        }
        .login-header p { 
            color: #666; 
            font-size: 14px; 
        }
        .form-group label { 
            color: #333; 
            font-weight: 500; 
        }
        .form-control { 
            padding: 10px 15px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            font-size: 14px; 
        }
        .form-control:focus { 
            border-color: #006a4e; 
            box-shadow: 0 0 0 0.2rem rgba(0, 106, 78, 0.25); 
        }
        .login-btn { 
            background: #006a4e; 
            color: white; 
            padding: 10px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            font-size: 16px; 
        }
        .login-btn:hover { 
            background: #005a42; 
        }
        .alert { 
            margin-bottom: 20px; 
            padding: 12px 15px; 
            border-radius: 5px; 
        }
        .alert-danger { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb; 
        }
        .alert-success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb; 
        }
        .loading { 
            display: none; 
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h2>🎓 Admin Login</h2>
        <p>Education Board Result System</p>
    </div>
    
    <div id="message"></div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="admin" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">
            <span class="login-text">Login</span>
            <span class="loading" id="loader">Loading...</span>
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; color: #666; font-size: 12px;">
        <p>Demo Credentials:</p>
        <p>Username: <strong>admin</strong></p>
        <p>Password: <strong>EducationBoard@006</strong></p>
    </div>
</div>

<script>
async function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');
    const loginBtn = document.getElementById('loginBtn');
    const loader = document.getElementById('loader');
    const loginText = document.querySelector('.login-text');
    
    // Show loading
    loginBtn.disabled = true;
    loginText.style.display = 'none';
    loader.style.display = 'inline';
    messageDiv.innerHTML = '';
    
    try {
        const response = await fetch('/admin/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
            messageDiv.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
            setTimeout(() => {
                window.location.href = '/admin';
            }, 1000);
        } else {
            messageDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.message}</div>`;
            loginBtn.disabled = false;
            loginText.style.display = 'inline';
            loader.style.display = 'none';
        }
    } catch (error) {
        messageDiv.innerHTML = `<div class="alert alert-danger">❌ Connection error: ${error.message}</div>`;
        loginBtn.disabled = false;
        loginText.style.display = 'inline';
        loader.style.display = 'none';
    }
}

// Auto-focus on username
window.addEventListener('load', () => {
    document.getElementById('username').focus();
});
</script>
</body>
</html>
